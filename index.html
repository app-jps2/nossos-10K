<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nosso Desafio 10k</title>
    <style>
        :root {
            --primary: #2ecc71;
            --bg: #1e272e;
            --card-bg: #2f3640;
            --text: #f5f6fa;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .header { text-align: center; margin-bottom: 25px; max-width: 500px; }
        .dashboard {
            background-color: var(--card-bg);
            border-radius: 15px;
            padding: 20px;
            width: 100%;
            max-width: 500px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            margin-bottom: 25px;
            box-sizing: border-box;
        }
        .stat-row { display: flex; justify-content: space-between; margin-bottom: 15px; font-size: 1.1rem; }
        .progress-bar-bg { background-color: #718093; border-radius: 10px; height: 20px; width: 100%; overflow: hidden; }
        .progress-bar { background-color: var(--primary); height: 100%; width: 0%; transition: width 0.3s ease; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(60px, 1fr)); gap: 10px; width: 100%; max-width: 500px; }
        .cell {
            background-color: var(--card-bg); border: 2px solid #718093; border-radius: 8px; padding: 15px 0;
            text-align: center; font-weight: bold; cursor: pointer; user-select: none; transition: all 0.2s ease;
        }
        .cell.checked { background-color: var(--primary); border-color: var(--primary); color: #1e272e; box-shadow: 0 0 10px rgba(46, 204, 113, 0.5); }
        .loading { font-style: italic; color: #aaa; text-align: center; margin-bottom: 10px; }
        h1 { margin: 5px 0; color: var(--primary); }
    </style>
</head>
<body>

    <div class="header">
        <h1>Desafio R$ 10.011</h1>
        <p>Marque abaixo os valores já depositados!</p>
        <div id="status-rede" class="loading">Conectando ao banco de dados...</div>
    </div>

    <div class="dashboard">
        <div class="stat-row"><span>Acumulado:</span><strong id="total-saved" style="color: var(--primary);">R$ 0,00</strong></div>
        <div class="stat-row"><span>Falta:</span><span id="total-remaining">R$ 10.011,00</span></div>
        <div class="stat-row"><span>Progresso:</span><span id="progress-percent">0%</span></div>
        <div class="progress-bar-bg"><div class="progress-bar" id="progress-bar"></div></div>
    </div>

    <div class="grid" id="matrix-grid"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, doc, onSnapshot, setDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        // Suas configurações oficiais do Firebase inseridas com sucesso
        const firebaseConfig = {
            apiKey: "AIzaSyCtdHE_DN_3LF16G_KRsOlferS-gdcUnw4",
            authDomain: "meu-app-10k.firebaseapp.com",
            projectId: "meu-app-10k",
            storageBucket: "meu-app-10k.firebasestorage.app",
            messagingSenderId: "815030707217",
            appId: "1:815030707217:web:baaa26277b64757ae6bdb0",
            measurementId: "G-BBTFS2T6K9"
        };

        // Inicialização dos serviços
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const docRef = doc(db, "desafio10k", "progresso_usuario");

        const targetValue = 10011;
        const gridContainer = document.getElementById('matrix-grid');
        let checkedNumbers = [];
        let isFirstLoad = true;

        // Renderização visual dos quadradinhos (1 ao 141)
        function renderGrid() {
            gridContainer.innerHTML = '';
            for (let i = 1; i <= 141; i++) {
                const cell = document.createElement('div');
                cell.classList.add('cell');
                cell.innerText = i;

                if (checkedNumbers.includes(i)) {
                    cell.classList.add('checked');
                }

                cell.addEventListener('click', async () => {
                    if (isFirstLoad) return; // Trava de segurança enquanto carrega do banco

                    document.getElementById('status-rede').innerText = "Salvando na nuvem...";
                    if (cell.classList.contains('checked')) {
                        checkedNumbers = checkedNumbers.filter(num => num !== i);
                    } else {
                        checkedNumbers.push(i);
                    }
                    
                    // Envia a nova lista de números marcados para a nuvem
                    await setDoc(docRef, { numeros: checkedNumbers });
                });

                gridContainer.appendChild(cell);
            }
        }

        // Atualização dos textos do painel de controle superior
        function updateDashboard() {
            let currentSaved = 0;
            checkedNumbers.forEach(num => currentSaved += num);
            const remaining = targetValue - currentSaved;
            const percent = ((currentSaved / targetValue) * 100).toFixed(1);

            document.getElementById('total-saved').innerText = currentSaved.toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });
            document.getElementById('total-remaining').innerText = remaining.toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });
            document.getElementById('progress-percent').innerText = `${percent}%`;
            document.getElementById('progress-bar').style.width = `${percent}%`;
        }

        // Renderiza a estrutura inicial travada
        renderGrid();

        // Ouve as mudanças no Firebase em tempo real
        onSnapshot(docRef, (docSnap) => {
            if (docSnap.exists()) {
                checkedNumbers = docSnap.data().numeros || [];
            } else {
                checkedNumbers = [];
            }
            
            isFirstLoad = false; // Desbloqueia os cliques com segurança após o carregamento inicial
            document.getElementById('status-rede').innerText = "✓ Sincronizado e seguro";
            renderGrid();
            updateDashboard();
        }, (error) => {
            document.getElementById('status-rede').innerText = "Erro ao sincronizar.";
            console.error("Erro no Firebase: ", error);
        });
    </script>
</body>
</html>
